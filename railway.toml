[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.variables]
RAILWAY_RUN_UID = "0"

[[volumes]]
mountPath = "/data"
